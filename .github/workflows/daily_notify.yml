name: Daily Lunch Notification

on:
  schedule:
    # 평일 오전 9시 10분 (KST = UTC+9) 목표
    # GitHub Actions 스케줄링 지연(~30분)을 고려하여 8시 40분에 예약
    # UTC 기준 23시 50분 (전날) = KST 8시 50분
    # 실제 실행 시간: ~9시 10분 KST (git action의 cron은 최대 1시간 지연 가능)
    # 월요일(1) ~ 금요일(5) 평일에만 실행 (0=일요일, 6=토요일 제외)
    - cron: '50 23 * * 1-5'
  workflow_dispatch:  # 수동 실행 가능

jobs:
  send-daily-lunch:
    runs-on: ubuntu-latest
    permissions:
      contents: read  # Required to checkout repository
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
    
    - name: Validate Mattermost Webhook URL
      env:
        WEBHOOK_URL: ${{ secrets.MATTERMOST_WEBHOOK_URL }}
      run: |
        if [ -z "$WEBHOOK_URL" ]; then
          echo "❌ 오류: MATTERMOST_WEBHOOK_URL secret이 설정되지 않았습니다."
          echo ""
          echo "다음 단계를 수행하세요:"
          echo "1. GitHub Repository Settings로 이동"
          echo "2. Secrets and variables > Actions 선택"
          echo "3. 'New repository secret' 클릭"
          echo "4. Name: MATTERMOST_WEBHOOK_URL"
          echo "5. Value: Mattermost Webhook URL 입력"
          echo "6. 'Add secret' 클릭"
          echo ""
          echo "자세한 내용은 README.md 파일을 참조하세요."
          exit 1
        else
          echo "✅ MATTERMOST_WEBHOOK_URL이 설정되어 있습니다."
        fi
    
    - name: Send daily lunch notification
      env:
        MATTERMOST_WEBHOOK_URL: ${{ secrets.MATTERMOST_WEBHOOK_URL }}
      run: |
        cd src
        python main.py daily --db ../db

name: Weekly Menu Notification

on:
  workflow_dispatch:  # 수동 실행 (이미지 업로드 후 실행)
    inputs:
      image_path:
        description: '식단표 이미지 경로'
        required: true
        default: 'meal_schedule.jpg'

jobs:
  process-and-notify:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y tesseract-ocr tesseract-ocr-kor
    
    - name: Install Python dependencies
      run: |
        pip install -r requirements.txt
    
    - name: Validate Mattermost Webhook URL
      run: |
        if [ -z "${{ secrets.MATTERMOST_WEBHOOK_URL }}" ]; then
          echo "❌ 오류: MATTERMOST_WEBHOOK_URL secret이 설정되지 않았습니다."
          echo ""
          echo "다음 단계를 수행하세요:"
          echo "1. GitHub Repository Settings로 이동"
          echo "2. Secrets and variables > Actions 선택"
          echo "3. 'New repository secret' 클릭"
          echo "4. Name: MATTERMOST_WEBHOOK_URL"
          echo "5. Value: Mattermost Webhook URL 입력"
          echo "6. 'Add secret' 클릭"
          echo ""
          echo "자세한 내용은 README.md 파일을 참조하세요."
          exit 1
        else
          echo "✅ MATTERMOST_WEBHOOK_URL이 설정되어 있습니다."
        fi
    
    - name: Process image and send weekly menu
      env:
        MATTERMOST_WEBHOOK_URL: ${{ secrets.MATTERMOST_WEBHOOK_URL }}
      run: |
        cd src
        python main.py process --image ../${{ github.event.inputs.image_path }}
    
    - name: Commit and push generated markdown files
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add db/*.md
        git diff --staged --quiet || git commit -m "Add weekly menu markdown [skip ci]"
        git push

name: Weekly Menu Notification

on:
  workflow_dispatch:  # 수동 실행 (이미지 업로드 후 실행)
    inputs:
      image_path:
        description: '식단표 이미지 경로'
        required: true
        default: 'meal_schedule.jpg'
      step:
        description: '실행할 단계 (ocr: OCR 처리만, notify: 전송만)'
        required: true
        default: 'ocr'
        type: choice
        options:
          - ocr
          - notify

jobs:
  ocr-process:
    # OCR 처리 및 Markdown 저장 (웹훅 전송 없음)
    if: github.event.inputs.step == 'ocr'
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to commit and push markdown files
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y tesseract-ocr tesseract-ocr-kor
    
    - name: Install Python dependencies
      run: |
        pip install -r requirements.txt
    
    - name: Process image with OCR and save to db/
      run: |
        cd src
        python main.py ocr --image ../${{ github.event.inputs.image_path }} --db ../db
    
    - name: Commit and push generated markdown files
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # db/ 디렉토리의 .md 파일이 있는지 확인
        if find db -name '*.md' -type f | grep -q .; then
          git add db/*.md
          git diff --staged --quiet || git commit -m "Add weekly menu markdown [skip ci]"
          git push
          echo "✓ Markdown 파일이 커밋되고 푸시되었습니다."
        else
          echo "⚠️ db/ 디렉토리에 .md 파일이 없습니다."
          echo "OCR 처리가 실패했거나 파일 생성에 문제가 있을 수 있습니다."
          exit 1
        fi
  
  notify-weekly:
    # 저장된 Markdown 파일로 웹훅 전송
    if: github.event.inputs.step == 'notify'
    runs-on: ubuntu-latest
    permissions:
      contents: read  # Required to checkout repository
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install Python dependencies
      run: |
        pip install -r requirements.txt
    
    - name: Validate Mattermost Webhook URL
      env:
        WEBHOOK_URL: ${{ secrets.MATTERMOST_WEBHOOK_URL }}
      run: |
        if [ -z "$WEBHOOK_URL" ]; then
          echo "❌ 오류: MATTERMOST_WEBHOOK_URL secret이 설정되지 않았습니다."
          echo ""
          echo "다음 단계를 수행하세요:"
          echo "1. GitHub Repository Settings로 이동"
          echo "2. Secrets and variables > Actions 선택"
          echo "3. 'New repository secret' 클릭"
          echo "4. Name: MATTERMOST_WEBHOOK_URL"
          echo "5. Value: Mattermost Webhook URL 입력"
          echo "6. 'Add secret' 클릭"
          echo ""
          echo "자세한 내용은 README.md 파일을 참조하세요."
          exit 1
        else
          echo "✅ MATTERMOST_WEBHOOK_URL이 설정되어 있습니다."
        fi
    
    - name: Send weekly menu notification
      env:
        MATTERMOST_WEBHOOK_URL: ${{ secrets.MATTERMOST_WEBHOOK_URL }}
      run: |
        cd src
        # notify 명령은 기본적으로 오늘 날짜(YYYY-MM-DD)의 파일을 찾습니다
        python main.py notify --db ../db
